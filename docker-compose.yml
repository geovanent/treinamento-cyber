services:
  mock-bank:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4001
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-coolify}
    expose:
      - "4001"
    volumes:
      - mock-bank-data:/app/data

volumes:
  mock-bank-data:
